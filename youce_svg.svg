<svg width="850" height="150" viewBox="0 0 850 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="YOUSSEF TALIBI GitHub profile cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="850" y2="150">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#071B73"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#2563EB" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="neon" x1="230" y1="0" x2="620" y2="150">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="50%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>

    <linearGradient id="visor" x1="330" y1="30" x2="525" y2="125">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.95"/>
      <stop offset="42%" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A855F7" stop-opacity="0.62"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .name {
        font-family: Inter, Segoe UI, Arial, sans-serif;
        font-size: 36px;
        font-weight: 900;
        letter-spacing: 5px;
      }

      .scan {
        animation: scan 4s ease-in-out infinite;
      }

      @keyframes scan {
        0%, 100% { opacity: .55; transform: translateX(-8px); }
        50% { opacity: 1; transform: translateX(8px); }
      }
    </style>
  </defs>

  <rect width="850" height="150" rx="20" fill="url(#bg)"/>
  <circle cx="425" cy="75" r="210" fill="url(#glow)"/>

  <!-- Minimal futuristic faceless head -->
  <g transform="translate(320 14)">
    <path d="M64 30C85 10 124 9 155 27C190 48 199 89 176 114C145 130 92 127 62 111C39 99 41 54 64 30Z" fill="#020617" opacity="0.82"/>
    <path d="M64 30C85 10 124 9 155 27C190 48 199 89 176 114C145 130 92 127 62 111C39 99 41 54 64 30Z" fill="url(#visor)" opacity="0.34" stroke="#7DD3FC" stroke-opacity="0.7" stroke-width="1.6"/>
    <path class="scan" d="M47 78C85 52 132 38 190 31" stroke="#7DD3FC" stroke-width="5" stroke-linecap="round" filter="url(#softGlow)"/>
    <path d="M54 84C95 64 142 50 196 42" stroke="#FFFFFF" stroke-opacity="0.75" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M75 112C111 124 152 122 183 106" stroke="#22D3EE" stroke-width="2.4" stroke-linecap="round" opacity="0.72"/>
    <circle cx="190" cy="32" r="4" fill="#FFFFFF" filter="url(#softGlow)"/>
  </g>

  <!-- Simple name -->
  <text x="425" y="122" text-anchor="middle" class="name" fill="#FFFFFF">YOUSSEF TALIBI</text>
  <rect x="287" y="132" width="276" height="3" rx="2" fill="url(#neon)" filter="url(#softGlow)"/>

  <rect x="1" y="1" width="848" height="148" rx="19" stroke="url(#neon)" stroke-opacity="0.35" stroke-width="2"/>
</svg>
